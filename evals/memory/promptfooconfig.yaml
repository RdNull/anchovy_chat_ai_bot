# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Memory processing eval"

prompts:
  - id: file://../../src/prompts/memory/v1.j2
    label: "Memory v1"

providers:
  - file://../models/cloud/memory/v1.yaml

defaultTest:
  assert:
    - type: is-json
    - type: llm-rubric
      provider:
        id: openrouter:deepseek/deepseek-v3.2
        config:
          temperature: 0.3
      value: |
        You are evaluating a structured memory update for a group chat.
        
        Original Memory:
        {{current_memory}}
        
        New Messages:
        {{new_messages}}
        
        Evaluation criteria:
        1. Accuracy: Does the updated memory accurately reflect the new information in the messages?
        2. No Hallucinations: Does the update contain information not present in either the original memory or the new messages?
        3. Atomicity: Are the facts and entries short and atomic?
        4. Consistency: Does it avoid duplicating existing information if it hasn't changed?
        5. Format: Does it follow the required schema (facts, decisions, topics, open_loops, participants, etc.)?
        6. Humor: Does it detects jokes and irony and marks them appropriately?
        7. Language: Is it in Russian as required (except for names/technical terms)?
        8. Participants: Does it correctly attribute facts to participants using their exact nicknames?

        Scoring targets:
        - 1.0 = perfect update
        - 0.8 = good update, missed jokes or irony
        - 0.7 = minor issues (e.g., slightly wordy, minor formatting)
        - 0.3 = major issues (e.g., hallucinations, missing key facts)
        - 0.0 = completely incorrect or invalid JSON

tests:
  - description: "new_facts"
    vars:
      current_memory: "{}"
      new_messages: file://new_facts/input.txt

  - description: "existing_memory_update"
    vars:
      current_memory: file://update_facts/current.json
      new_messages: file://update_facts/input.txt

  - description: "participants_info"
    vars:
      current_memory: "{}"
      new_messages: file://participants_info/input.txt

  - description: "real_flood"
    vars:
      current_memory: "{}"
      new_messages: file://real_flood/input.txt