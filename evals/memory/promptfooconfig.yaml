# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Memory processing eval"

prompts:
  - id: file://../../src/prompts/memory/v1.j2
    label: "Memory v1"

providers:
  - file://../models/cloud/memory/v1.yaml

defaultTest:
  assert:
    - type: is-json
    - type: llm-rubric
      provider:
        id: openrouter:deepseek/deepseek-v3.2
        config:
          temperature: 0.5
      value: |
        You are evaluating a structured memory update for a group chat.
        
        Evaluation criteria:
        - Accuracy: Does the updated memory accurately reflect the new information in the messages?
        - No Hallucinations: Does the update contain information not present in either the original memory or the new messages?
        - Atomicity: Are the facts and entries short and atomic?
        - Consistency: Does it avoid duplicating existing information if it hasn't changed?
        - Format: Does it follow the required schema (facts, decisions, topics, open_loops, participants, etc.)?
        - Carryover: Does the update preserve important information from the original memory that was not mentioned in the new messages?
        - Cleanup: Does it skips finished entries from `open_loops`?
        - Humor: Does it correctly detects jokes and irony if they exist in messages? If not sure is something is joke or irony - ignore it.
        - Language: Is it in Russian as required (except for names/technical terms)?
        - Participants: Does it correctly attribute facts to participants using their exact nicknames?

        Scoring targets:
        - 1.0 = perfect update
        - 0.8 = good update, missed existing jokes or irony
        - 0.7 = minor issues (e.g., slightly wordy, minor formatting)
        - 0.3 = major issues (e.g., hallucinations, missing key facts)
        - 0.0 = completely incorrect or invalid JSON
        
        ---
        Original Memory:
        {{current_memory}}
        
        New Messages:
        {{new_messages}}

tests:
  - description: "new_facts"
    vars:
      current_memory: "{}"
      new_messages: file://new_facts/input.txt

  - description: "existing_memory_update"
    vars:
      current_memory: file://update_facts/current.json
      new_messages: file://update_facts/input.txt

  - description: "participants_info"
    vars:
      current_memory: "{}"
      new_messages: file://participants_info/input.txt

  - description: "real_flood"
    vars:
      current_memory: "{}"
      new_messages: file://real_flood/input.txt