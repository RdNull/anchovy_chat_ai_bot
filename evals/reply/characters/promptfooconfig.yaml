# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Character setup eval"

prompts:
  - id: file://../prompts/v2.js
    label: "Character v2"

providers:
  - id: file://../../models/cloud/chat/v3.yaml

defaultTest:
  vars:
    memory: '{{memory_data | safe}}'
    character_description: [
      file://../../../src/characters/repository/whyzzzy.yaml
    ]
  assert:
    # response must be between 1 and 20 words long
    - type: word-count
      value:
        min: 1
        max: 20
    # no special characters allowed in the response
    - type: not-regex
      value: "[\\[\\]{}|\\\/<>#$&*]"

    - type: llm-rubric
      metric: personality
      provider:
        id: openrouter:openai/gpt-4o-mini
        config:
          temperature: 0.2
      value: |
        Given this character:
        {{character_description}}

        Does the reply follow the character personality?

    - type: llm-rubric
      metric: personality
      provider:
        id: openrouter:openai/gpt-4o-mini
        config:
          temperature: 0.2
      value: |
        Given this character:
        {{character_description}}

        Is the toxicity and language level consistent with what's described for this character?
        Not too soft, not beyond what the character allows.

    - type: llm-rubric # delivery checks
      metric: humor
      provider:
        id: openrouter:openai/gpt-4o-mini
        config:
          temperature: 0.2
      value: |
        Given this character:
        {{character_description}}

        - Does the response match the humor delivery style described for this character?
        - Does it stop at the right moment without over-extending or explaining the joke?
        - Is the tone and confidence level consistent with the character?

        Score each question from 0 to 1 and return the average score as the final result.
        
        Memory:
        {{memory}}
        
        Related messages:
        {{related_messages}}
        
        Last messages:
        {{messages}}

    - type: llm-rubric # reaction checks
      metric: humor
      provider:
        id: openrouter:openai/gpt-4o-mini
        config:
          temperature: 0.2
      value: |
        Given this character:
        {{character_description}}

        - Does the response feel like a natural reaction to the conversation rather than a constructed joke?
        - Does it land confidently on its own, even if it has nothing to do with the conversation?
        - Does it avoid being try-hard or over-constructed for this character's style?

        Score each question from 0 to 1 and return the average score as the final result.
        
        Memory:
        {{memory}}
        
        Related messages:
        {{related_messages}}
        
        Last messages:
        {{messages}}

    - type: llm-rubric # context checks
      metric: humor
      provider:
        id: openrouter:openai/gpt-4o-mini
        config:
          temperature: 0.2
      value: |
        Given this character:
        {{character_description}}

        - How relevant is the response to the current conversation?
        - Does it match the character's personality as described?
        - Does it avoid being try-hard or over-constructed for this character's style?

        Score each question from 0 to 1 and return the average score as the final result.
        
        Memory:
        {{memory}}
        
        Related messages:
        {{related_messages}}
        
        Last messages:
        {{messages}}

tests:
  - description: "basic"
    vars:
      messages: file://basic/messages.json

  - description: "chaos_injection_reaction"
    vars:
      messages: file://chaos_injection_reaction/messages.json

  - description: "language_mix_and_typos"
    vars:
      messages: file://language_mix_and_typos/messages.json

  - description: "random_injection_low_context"
    vars:
      messages: file://random_injection_low_context/messages.json

  - description: "topic_change"
    vars:
      messages: file://topic_change/messages.json

  - description: "toxic_joke"
    vars:
      messages: file://toxic_joke/messages.json