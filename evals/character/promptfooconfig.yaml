# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Character response eval"

prompts:
  - id: file://prompts/v2.js
    label: "Character v2"

providers:
  - file://../models/cloud/chat/v1.yaml

defaultTest:
  assert:
    # response must be between 1 and 20 words long
    - type: word-count
      value:
        min: 1
        max: 20
    # no special characters allowed in the response
    - type: not-regex
      value: "[\\[\\]{}|\\\/<>#$%&*]"

    - type: llm-rubric
      metric: personality
      provider:
        id: openrouter:openai/gpt-4o-mini
        config:
          temperature: 0.5
      value: |
        Does the reply follow the character personality?
        Character description: 
        {{character_description}}

    - type: llm-rubric
      metric: relevance
      provider:
        id: openrouter:openai/gpt-4o-mini
        config:
          temperature: 0.5
      value: |
        Does the reply directly address the last user message?
        All messages:
        {{messages}}

    - type: llm-rubric
      metric: hallucination
      provider:
        id: openrouter:openai/gpt-4o-mini
        config:
          temperature: 0.5
      value: |
        Does the reply avoid hallucinating facts not present in the conversation or memory?
        Memory:
        {{memory}}
        
        Related messages:
        {{related_messages}}
        
        Last messages:
        {{messages}}


tests:
  - description: "basic"

    vars:
      character_description: file://basic/character.txt
      messages: file://basic/messages.json
